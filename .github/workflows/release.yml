name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # nécessaire pour créer la GitHub Release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # better-sqlite3 est un module natif — doit être recompilé pour Electron
      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build renderer (Vite)
        run: npm run build:renderer

      - name: Build main process (TypeScript)
        run: npm run build:electron

      - name: Build & publish installer Windows
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          EP_DRAFT: false
        run: npx electron-builder --win --publish always

      - name: Publier la release (retirer le statut draft)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $release = gh release view $tag --json id,isDraft | ConvertFrom-Json
          if ($release.isDraft) {
            gh release edit $tag --draft=false
            Write-Host "Release $tag publiée."
          } else {
            Write-Host "Release $tag déjà publiée."
          }
